name: Build e Publicar APK

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

    - run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew clean assembleRelease --stacktrace

    - name: Nomear APK
      run: |
        TAG="${{ github.ref_name }}"
        [ -z "$TAG" ] && TAG="v2.1.0"
        cp app/build/outputs/apk/release/app-release-unsigned.apk \
           "Padrao7Imoveis-${TAG}.apk"
        echo "APK=Padrao7Imoveis-${TAG}.apk" >> $GITHUB_ENV
        echo "TAG=${TAG}" >> $GITHUB_ENV

    - name: Publicar Release no GitHub
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        name: "Padrao 7 Imoveis ${{ env.TAG }}"
        body: |
          ## Padrao 7 Imoveis — ${{ env.TAG }}

          Baixe o APK abaixo e instale no celular.
          Android 5.0+ compativel.
        files: ${{ env.APK }}
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifact (push normal)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APK }}
        path: ${{ env.APK }}
        retention-days: 30
